<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Framework Gallery | Sadam Hussain Qureshi</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-light: #eef2ff;
            --accent: #f43f5e;
            --bg: #fafafa;
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-sub: #64748b;
            --border: #e2e8f0;
            --radius-lg: 24px;
            --radius-md: 16px;
            --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.04), 0 4px 6px -2px rgba(0, 0, 0, 0.02);
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }

        /* Glassmorphism Nav */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem 5%;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .name-brand {
            font-weight: 800;
            font-size: 1.2rem;
            letter-spacing: -0.03em;
            text-transform: uppercase;
        }

        .name-brand span { color: var(--primary); }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 80px 24px;
        }

        header {
            text-align: center;
            margin-bottom: 60px;
        }

        header h1 {
            font-size: clamp(2.5rem, 5vw, 3.5rem);
            font-weight: 800;
            letter-spacing: -0.04em;
            margin-bottom: 20px;
            background: linear-gradient(to right, #0f172a, #6366f1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Filter Section for Future-Proofing */
        .filter-bar {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 50px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 8px 20px;
            border-radius: 100px;
            border: 1px solid var(--border);
            background: white;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        .filter-btn.active {
            background: var(--text-main);
            color: white;
            border-color: var(--text-main);
        }

        /* Grid & Cards */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
            gap: 32px;
        }

        .card {
            background: var(--card-bg);
            border-radius: var(--radius-lg);
            overflow: hidden;
            border: 1px solid var(--border);
            transition: all 0.5s cubic-bezier(0.19, 1, 0.22, 1);
            position: relative;
        }

        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.1);
            border-color: var(--primary);
        }

        .preview-box {
            position: relative;
            width: 100%;
            height: 260px;
            background: #f1f5f9;
            overflow: hidden;
        }

        .preview-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.8s ease;
        }

        .card:hover .preview-box img {
            transform: scale(1.08);
        }

        .content {
            padding: 28px;
        }

        .tag {
            font-size: 0.7rem;
            font-weight: 800;
            color: var(--primary);
            background: var(--primary-light);
            padding: 4px 14px;
            border-radius: 100px;
            display: inline-block;
            margin-bottom: 16px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .content h3 {
            font-size: 1.4rem;
            margin: 0 0 16px 0;
            font-weight: 700;
            color: var(--text-main);
        }

        .button {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            box-sizing: border-box;
            padding: 14px;
            text-decoration: none;
            background: var(--text-main);
            color: #fff;
            border-radius: var(--radius-md);
            font-weight: 700;
            font-size: 0.95rem;
            transition: 0.3s;
            gap: 8px;
        }

        .button svg {
            flex-shrink: 0;
            margin-top: 1px;
        }

        .button:hover {
            background: var(--primary);
            box-shadow: 0 10px 20px -10px var(--primary);
        }

        footer {
            text-align: center;
            padding: 80px 24px;
            background: #fff;
            border-top: 1px solid var(--border);
            margin-top: 100px;
        }

        .footer-socials {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 24px;
        }

        .footer-socials a {
            color: var(--text-sub);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 600;
            transition: 0.3s;
        }

        .footer-socials a:hover { color: var(--primary); }

        @media (max-width: 768px) {
            .grid { grid-template-columns: 1fr; }
            .container { padding: 40px 20px; }
            nav { padding: 1rem 1.5rem; }
        }
    </style>
</head>
<body>
